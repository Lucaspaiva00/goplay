<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>GoPlay – Horários</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BASE -->
    <link rel="stylesheet" href="../css/goplay_home.css">

    <!-- PAGE -->
    <link rel="stylesheet" href="../css/horarios.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
        <div class="logo-area">
            <h2>GoPlay</h2>
        </div>
        <ul id="menuDynamic"></ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- TOPBAR -->
    <header class="topbar">
        <button id="menuBtn" class="menu-btn">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="title">Horários</h1>
    </header>

    <!-- CONTEÚDO -->
    <main class="content">

        <div class="card">
            <div class="header">
                <h2>Agenda do Society</h2>
                <input type="date" id="data">
            </div>

            <div id="listaHorarios"></div>
        </div>

    </main>

    <!-- JS -->
    <script src="../js/goplay_home.js"></script>
    <script src="../scripts/menu.js"></script>
    <script src="../scripts/horarios.js"></script>

</body>

</html>
