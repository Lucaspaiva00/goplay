<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Campos – GoPlay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/goplay_home.css">
    <link rel="stylesheet" href="../css/campos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="with-sidebar">

    <!-- HEADER -->
    <header class="topbar">
        <button id="menuBtn" class="menu-btn">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="title">Campos</h1>
    </header>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
        <div class="logo-area">
            <h2>GoPlay</h2>
        </div>
        <ul id="menuDynamic"></ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- CONTEÚDO -->
    <main class="content">

        <section class="card">
            <h3 class="form-title">Novo Campo</h3>

            <input id="nome" class="input" placeholder="Nome do campo">
            <input id="valorAvulso" class="input" placeholder="Valor Avulso (opcional)">
            <input id="valorMensal" class="input" placeholder="Valor Mensal (opcional)">
            <input id="dimensoes" class="input" placeholder="Dimensões (ex: 30x50m)">
            <input id="estiloGramado" class="input" placeholder="Estilo do Gramado">
            <input id="foto" class="input" placeholder="URL da foto">

            <button class="btn btn-primary" onclick="salvarCampo()">Salvar Campo</button>
        </section>

        <h2 class="page-title">🌱 Campos cadastrados</h2>

        <section id="listaCampos" class="card">
            Carregando campos...
        </section>

    </main>

    <!-- MODAL EDITAR CAMPO -->
    <div id="editCampoModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Editar Campo</h3>
                <button class="modal-close" onclick="fecharModalCampo()">
                    <i class="fa fa-times"></i>
                </button>
            </div>

            <div class="modal-body">
                <input id="editNome" class="input" placeholder="Nome do campo">
                <input id="editValorAvulso" class="input" placeholder="Valor Avulso (opcional)">
                <input id="editValorMensal" class="input" placeholder="Valor Mensal (opcional)">
                <input id="editDimensoes" class="input" placeholder="Dimensões (ex: 30x50m)">
                <input id="editEstiloGramado" class="input" placeholder="Estilo do Gramado">
                <input id="editFoto" class="input" placeholder="URL da foto">
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="salvarEdicaoCampo()">Salvar Alterações</button>
                <button class="btn btn-secondary" onclick="fecharModalCampo()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../js/goplay_home.js"></script>
    <script src="../scripts/campos.js"></script>
    <script src="../scripts/menu.js"></script>

</body>

</html>
