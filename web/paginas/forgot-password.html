<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esqueci minha senha - GoPlay</title>
    <link rel="stylesheet" href="../css/goplay_home.css" />
</head>

<body>
    <header class="topbar">
        <button class="menu-btn" onclick="window.location.href='login.html'">←</button>
        <div class="title">GoPlay</div>
    </header>

    <main class="content auth-content">
        <section class="auth-box">
            <div class="auth-header">
                <h1>Esqueci minha senha</h1>
                <p>Digite seu e-mail para receber o link de redefinição.</p>
            </div>

            <div class="auth-body">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" />
                </div>

                <button class="btn navy" onclick="solicitarReset()">Enviar link</button>

                <div id="msg" class="form-message"></div>

                <div class="auth-links">
                    <a href="login.html">Voltar para o login</a>
                </div>
            </div>
        </section>
    </main>

    <script src="../scripts/forgot-password.js"></script>
</body>

</html>
