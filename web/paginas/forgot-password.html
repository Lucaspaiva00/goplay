<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esqueci minha senha - GoPlay</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: #fff;
            padding: 32px;
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
        }

        p {
            color: #666;
            text-align: center;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            background: #111;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .msg {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .link-login {
            display: block;
            margin-top: 16px;
            text-align: center;
            text-decoration: none;
            color: #111;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Esqueci minha senha</h1>
        <p>Informe seu e-mail para receber o link de redefinição.</p>

        <input type="email" id="email" placeholder="Digite seu e-mail" />
        <button onclick="solicitarReset()">Enviar link</button>

        <div class="msg" id="msg"></div>

        <a class="link-login" href="login.html">Voltar para login</a>
    </div>

    <script src="../scripts/forgot-password.js"></script>
</body>

</html>
