<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard Executivo — GoPlay</title>

    <link rel="stylesheet" href="../css/goplay_home.css" />
    <link rel="stylesheet" href="../css/society-dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="with-sidebar">

    <main class="content">

        <!-- HERO -->
        <div class="hero">
            <div>
                <h1>Dashboard do Society</h1>
                <p>Visão completa do seu faturamento e operação</p>
            </div>

            <div class="hero-value">
                <span>Receita Total</span>
                <strong id="receitaTotal"></strong>
            </div>
        </div>

        <!-- KPIs -->
        <div class="kpis">

            <div class="kpi destaque">
                <span>Hoje</span>
                <strong id="receitaHoje"></strong>
            </div>

            <div class="kpi">
                <span>Este mês</span>
                <strong id="receitaMes"></strong>
            </div>

            <div class="kpi">
                <span>Pendente</span>
                <strong id="pendente"></strong>
            </div>

            <div class="kpi">
                <span>Ticket médio</span>
                <strong id="ticket"></strong>
            </div>

            <div class="kpi">
                <span>Ocupação</span>
                <strong id="ocupacao"></strong>
            </div>

        </div>

        <!-- GRID PRINCIPAL -->
        <div class="grid">

            <!-- GRÁFICO PRINCIPAL -->
            <div class="card big">
                <h3>📈 Receita por dia</h3>
                <canvas id="chartLinha"></canvas>
            </div>

            <!-- RESUMO LATERAL -->
            <div class="card">
                <h3>💡 Insights</h3>
                <div id="insights"></div>
            </div>

            <!-- GRÁFICOS SECUNDÁRIOS -->
            <div class="card">
                <h3>💰 Tipos de receita</h3>
                <canvas id="chartPizza"></canvas>
            </div>

            <div class="card">
                <h3>🔥 Horários mais vendidos</h3>
                <canvas id="chartBarra"></canvas>
            </div>

            <!-- RANKING -->
            <div class="card full">
                <h3>🏆 Ranking de Times</h3>
                <div id="rankingTimes" class="ranking"></div>
            </div>

        </div>

    </main>

    <script>
        const BASE_URL = "https://goplay-dzlr.onrender.com";

        function money(v) {
            return Number(v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        }

        async function carregar() {

            const societyId = localStorage.getItem("societyId");
            const res = await fetch(`${BASE_URL}/pagamentos/society/${societyId}`);
            const lista = await res.json();

            const pagos = lista.filter(p => p.status === "PAGO");

            const total = pagos.reduce((s, p) => s + p.valor, 0);

            const hoje = new Date().toDateString();
            const hojeTotal = pagos
                .filter(p => new Date(p.pagoEm).toDateString() === hoje)
                .reduce((s, p) => s + p.valor, 0);

            const mes = new Date().getMonth();
            const mesTotal = pagos
                .filter(p => new Date(p.pagoEm).getMonth() === mes)
                .reduce((s, p) => s + p.valor, 0);

            const pendente = lista
                .filter(p => p.status === "PENDENTE")
                .reduce((s, p) => s + p.valor, 0);

            const ticket = pagos.length ? total / pagos.length : 0;

            const totalSlots = 12 * 30;
            const ocupacao = (pagos.length / totalSlots) * 100;

            document.getElementById("receitaTotal").innerText = money(total);
            document.getElementById("receitaMes").innerText = money(mesTotal);
            document.getElementById("receitaHoje").innerText = money(hojeTotal);
            document.getElementById("pendente").innerText = money(pendente);
            document.getElementById("ticket").innerText = money(ticket);
            document.getElementById("ocupacao").innerText = ocupacao.toFixed(1) + "%";

            // 📈 linha
            const dias = {};
            pagos.forEach(p => {
                const d = new Date(p.pagoEm).toLocaleDateString("pt-BR");
                dias[d] = (dias[d] || 0) + p.valor;
            });

            if (Object.keys(dias).length === 0) dias["Sem dados"] = 0;

            new Chart(chartLinha, {
                type: "line",
                data: {
                    labels: Object.keys(dias),
                    datasets: [{
                        label: "Receita",
                        data: Object.values(dias),
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                }
            });

            // 🥧 pizza
            const tipos = { AVULSO: 0, MENSALISTA: 0 };
            pagos.forEach(p => tipos[p.tipo] += p.valor);

            new Chart(chartPizza, {
                type: "doughnut",
                data: {
                    labels: Object.keys(tipos),
                    datasets: [{
                        data: Object.values(tipos)
                    }]
                }
            });

            // 📊 barra
            const horas = {};
            lista.forEach(p => {
                const h = p.agendamento?.horaInicio || "Outro";
                horas[h] = (horas[h] || 0) + 1;
            });

            new Chart(chartBarra, {
                type: "bar",
                data: {
                    labels: Object.keys(horas),
                    datasets: [{
                        label: "Reservas",
                        data: Object.values(horas)
                    }]
                }
            });

            // ranking
            const ranking = {};
            pagos.forEach(p => {
                const t = p.time?.nome || "Desconhecido";
                ranking[t] = (ranking[t] || 0) + p.valor;
            });

            document.getElementById("rankingTimes").innerHTML =
                Object.entries(ranking)
                    .sort((a, b) => b[1] - a[1])
                    .map(([t, v], i) =>
                        `<div class="rank">
                            <span>#${i + 1}</span>
                            <strong>${t}</strong>
                            <b>${money(v)}</b>
                        </div>`
                    ).join("");

            // insights
            const insights = [];

            if (ocupacao < 40) insights.push("⚠️ Baixa ocupação");
            if (ticket < 50) insights.push("💰 Ticket médio baixo");

            document.getElementById("insights").innerHTML =
                insights.map(i => `<div class="insight">${i}</div>`).join("");

        }

        carregar();
    </script>

</body>

</html>
