<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Meu Time – GoPlay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/goplay_home.css">
    <link rel="stylesheet" href="../css/meu-time.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <h2>GoPlay</h2>
        </div>
        <ul id="menuDynamic"></ul>
    </aside>

    <div class="overlay" id="overlay"></div>

    <header class="topbar">
        <button id="menuBtn" class="menu-btn">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="title">
            <i class="fa fa-user-group"></i>
            Meu Time
        </h1>
    </header>

    <main class="content">
        <div class="meu-time-wrap">

            <div class="time-info-card" id="dadosTime">
                Carregando informações do time...
            </div>

            <div class="bloco-jogadores">
                <h3 class="subtitle">Jogadores</h3>
                <div id="listaJogadores" class="player-list">
                    Carregando jogadores...
                </div>
            </div>

            <button id="sair" class="btn-danger" style="display:none;">
                Sair do time
            </button>

        </div>
    </main>

    <script src="../js/goplay_home.js"></script>
    <script src="../scripts/menu.js"></script>
    <script src="../js/meuTime.js"></script>
</body>

</html>
