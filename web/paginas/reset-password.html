<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha - GoPlay</title>
  <link rel="stylesheet" href="../css/goplay_home.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <header class="topbar">
    <button class="menu-btn" onclick="window.location.href='login.html'">←</button>
    <div class="title">GoPlay</div>
  </header>

  <main class="content auth-content">
    <section class="auth-box">
      <div class="auth-header">
        <h1>Redefinir senha</h1>
        <p>Digite e confirme sua nova senha.</p>
      </div>

      <div class="auth-body">
        <div class="form-group">
          <label for="novaSenha">Nova senha</label>
          <div class="input-password-wrap">
            <input type="password" id="novaSenha" placeholder="Digite a nova senha" />
            <button type="button" class="toggle-password" onclick="toggleSenha('novaSenha', this)">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar senha</label>
          <div class="input-password-wrap">
            <input type="password" id="confirmarSenha" placeholder="Confirme a nova senha" />
            <button type="button" class="toggle-password" onclick="toggleSenha('confirmarSenha', this)">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn navy" onclick="redefinirSenha()">Salvar nova senha</button>

        <div id="msg" class="form-message"></div>

        <div class="auth-links">
          <a href="login.html">Voltar para o login</a>
        </div>
      </div>
    </section>
  </main>

  <script src="../scripts/reset-password.js"></script>
</body>

</html>
