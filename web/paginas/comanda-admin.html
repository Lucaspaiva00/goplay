<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>GoPlay – Comandas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/goplay_home.css">
    <link rel="stylesheet" href="../css/comanda.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <aside id="sidebar" class="sidebar">
        <div class="logo-area">
            <h2>GoPlay</h2>
        </div>
        <ul id="menuDynamic"></ul>
    </aside>

    <div id="overlay" class="overlay"></div>

    <header class="topbar">
        <button id="menuBtn" class="menu-btn">
            <i class="fa fa-bars"></i>
        </button>
        <h1 class="title">
            <i class="fa fa-cash-register"></i> Comandas
        </h1>
    </header>

    <main class="content">

        <section class="comanda-hero">
            <div>
                <h2>Gestão de Comandas</h2>
                <p>Acompanhe comandas abertas, fechadas e pagas do bar do society.</p>
            </div>

            <div class="comanda-hero-total">
                <span>Total em aberto</span>
                <strong id="totalAberto">R$ 0,00</strong>
            </div>
        </section>

        <section class="admin-kpis">
            <div class="admin-kpi">
                <span>Abertas</span>
                <strong id="kpiAbertas">0</strong>
            </div>

            <div class="admin-kpi">
                <span>Fechadas</span>
                <strong id="kpiFechadas">0</strong>
            </div>

            <div class="admin-kpi">
                <span>Pagas</span>
                <strong id="kpiPagas">0</strong>
            </div>

            <div class="admin-kpi destaque">
                <span>Receita bar</span>
                <strong id="kpiReceita">R$ 0,00</strong>
            </div>
        </section>

        <section class="comanda-card">
            <div class="admin-toolbar">
                <button class="filter-btn active" data-status="">Todas</button>
                <button class="filter-btn" data-status="ABERTA">Abertas</button>
                <button class="filter-btn" data-status="FECHADA">Fechadas</button>
                <button class="filter-btn" data-status="PAGA">Pagas</button>
                <button class="filter-btn" data-status="CANCELADA">Canceladas</button>
            </div>

            <div id="listaComandasAdmin" class="admin-list">
                <div class="loading">Carregando comandas...</div>
            </div>
        </section>

    </main>

    <div id="modalDetalhe" class="modal-overlay">
        <div class="modal-box modal-large">
            <button class="modal-close" id="btnFecharDetalhe">
                <i class="fa fa-times"></i>
            </button>

            <div class="modal-icon">
                <i class="fa fa-receipt"></i>
            </div>

            <h3 id="detalheTitulo">Comanda</h3>
            <p id="detalheSubtitulo">Detalhes do consumo.</p>

            <div id="detalheItens" class="detalhe-itens"></div>

            <div class="modal-actions-admin">
                <button class="btn-admin-secondary" id="btnGerarPagamento">
                    Gerar Pagamento
                </button>

                <button class="btn-admin-primary" id="btnConfirmarPagamento">
                    Confirmar Pagamento
                </button>
            </div>
        </div>
    </div>

    <script src="../js/goplay_home.js"></script>
    <script src="../scripts/menu.js"></script>
    <script src="../scripts/comanda-admin.js"></script>

</body>

</html>
